<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baku Mayen — Radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #b2b2b2;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      perspective: 820px;
      perspective-origin: 50% 46%;
    }

    .perspective-wrap {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      transform: rotateX(73deg) rotateY(0deg) rotateZ(38deg);
    }

    .radar-stage {
      position: relative;
      width: 520px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar-disc {
      position: absolute;
      width: 510px; height: 510px;
      border-radius: 50%;
      background: transparent;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #000;
      pointer-events: none;
    }
    
    .ring-3 { width: 320px; height: 320px; }
    .ring-4 { width: 420px; height: 420px; }
    .ring-5 { width: 510px; height: 510px; }

    .crosshair { 
      position: absolute; 
      background: #000; 
      pointer-events: none;
      -webkit-mask-image: radial-gradient(circle, transparent 110px, black 110px);
      mask-image: radial-gradient(circle, transparent 110px, black 110px);
    }
    .crosshair-h { width: 510px; height: 1px; }
    .crosshair-v { width: 1px; height: 510px; }

    .sweep-container {
      position: absolute;
      width: 510px; height: 510px;
      border-radius: 50%;
      overflow: hidden;
      animation: rotateSweep 10s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateSweep {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .sweep-arm {
      position: absolute;
      top: 50%; left: 50%;
      width: 50%; height: 2px;
      transform-origin: 0% 50%;
      background: linear-gradient(to right, rgba(0,0,0,0.0), rgba(0,0,0,0.65));
    }
    .sweep-trail {
      position: absolute;
      width: 510px; height: 510px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(255,255,255,0.0)  0deg,
        rgba(255,255,255,0.0)  265deg,
        rgba(0,0,0,0.04)       302deg,
        rgba(0,0,0,0.12)       354deg,
        rgba(0,0,0,0.0)        360deg
      );
      animation: rotateSweep 10s linear infinite;
      pointer-events: none;
    }

    #pingCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 520px; height: 520px;
      pointer-events: none;
      z-index: 15;
    }

    .contact-zone {
      position: absolute;
      z-index: 100; /* High z-index to ensure clickability */
      width: 32px; height: 32px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: crosshair;
      transform: translate(-50%, -50%);
      pointer-events: auto; /* Explicitly allow clicks */
      outline: none;
    }

    /* Screen-space Tooltips (Flat) */
    .flat-tooltip {
      position: fixed;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 4px 8px;
      border-radius: 2px;
      pointer-events: none;
      transform: translate(-50%, -140%);
      white-space: nowrap;
      display: none;
    }

    #uiLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
    }

    #mountainOverlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
      width: 280px;
    }
    #mountainOverlay img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hud-label {
      position: absolute;
      font-size: 9px;
      letter-spacing: 0.20em;
      color: rgba(0,0,0,0.34);
      text-transform: uppercase;
      user-select: none;
    }
    .hud-n  { top: 2px;    left: 50%; transform: translateX(-50%); }
    .hud-s  { bottom: 2px; left: 50%; transform: translateX(-50%); }
    .hud-e  { right: 4px;  top: 50%;  transform: translateY(-50%); }
    .hud-w  { left: 4px;   top: 50%;  transform: translateY(-50%); }

    #infoPanel {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.20em;
      color: rgba(0,0,0,0.38);
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 100;
      transition: color 0.22s;
      pointer-events: none;
    }
    #infoPanel.active { color: rgba(0,0,0,0.70); }
  </style>
</head>
<body>

  <div class="perspective-wrap">
    <div class="radar-stage" id="radarStage">
      <div class="radar-disc"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="ring ring-5"></div>
      <div class="crosshair crosshair-h"></div>
      <div class="crosshair crosshair-v"></div>
      <span class="hud-label hud-n">N</span>
      <span class="hud-label hud-s">S</span>
      <span class="hud-label hud-e">E</span>
      <span class="hud-label hud-w">W</span>
      <div class="sweep-trail"></div>
      <div class="sweep-container">
        <div class="sweep-arm"></div>
      </div>
      <canvas id="pingCanvas" width="520" height="520"></canvas>
    </div>
  </div>

  <div id="uiLayer"></div>

  <div id="mountainOverlay">
    <img src="BakuMayenIsland.png" alt="Baku Mayen Island" />
  </div>

  <div id="infoPanel">— select a contact —</div>

<script>
  const STAGE = 520, CX = 260, CY = 260;
  const PERIOD_MS = 10000;
  const PING_WIN = 6;
  const DOT_R = 4.5;
  const uiLayer = document.getElementById('uiLayer');

  const contacts = [
    { id:'01', angle: 22, radius: 188, label: 'CONTACT 01' },
    { id:'02', angle: 80, radius: 210, label: 'CONTACT 02' },
    { id:'03', angle: 140, radius: 175, label: 'CONTACT 03' },
    { id:'04', angle: 195, radius: 200, label: 'CONTACT 04' },
    { id:'05', angle: 255, radius: 182, label: 'CONTACT 05' },
    { id:'06', angle: 310, radius: 205, label: 'CONTACT 06' },
    { id:'07', angle: 52, radius: 240, label: 'CONTACT 07' },
  ];

  function toXY(a, r) {
    const rad = (a - 90) * Math.PI / 180;
    return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
  }

  contacts.forEach(c => {
    c.pos = toXY(c.angle, c.radius);
    c.scannedOnce = false;
    c.dotBorn = null;

    // Create Hover Zone (In 3D space)
    const zone = document.createElement('button');
    zone.className = 'contact-zone';
    zone.style.left = c.pos.x + 'px';
    zone.style.top = c.pos.y + 'px';
    document.getElementById('radarStage').appendChild(zone);
    c.zoneEl = zone;

    // Create Tooltip (In 2D Screen space)
    const tip = document.createElement('div');
    tip.className = 'flat-tooltip';
    tip.textContent = c.label;
    uiLayer.appendChild(tip);
    c.tipEl = tip;

    zone.addEventListener('mouseenter', () => { if(c.scannedOnce) tip.style.display = 'block'; });
    zone.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    zone.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!c.scannedOnce) return;
      
      contacts.forEach(other => other.zoneEl.classList.remove('selected'));
      zone.classList.add('selected');
      
      const info = document.getElementById('infoPanel');
      info.textContent = `${c.label}  ·  BRG ${String(c.angle).padStart(3,'0')}°  ·  RNG ${c.radius}M`;
      info.classList.add('active');
    });
  });

  // Sync flat tooltips to 3D positions
  function updateTooltips() {
    contacts.forEach(c => {
      if (c.tipEl.style.display === 'block') {
        const rect = c.zoneEl.getBoundingClientRect();
        c.tipEl.style.left = rect.left + rect.width/2 + 'px';
        c.tipEl.style.top = rect.top + 'px';
      }
    });
    requestAnimationFrame(updateTooltips);
  }
  updateTooltips();

  const canvas = document.getElementById('pingCanvas');
  const ctx = canvas.getContext('2d');
  const rings = [];

  function spawnRing(x, y) {
    rings.push({ x, y, born: performance.now() });
  }

  function draw(now) {
    ctx.clearRect(0, 0, STAGE, STAGE);
    
    // Rings
    for (let i = rings.length - 1; i >= 0; i--) {
      const rng = rings[i];
      const age = (now - rng.born) / 700;
      if (age >= 1) { rings.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(rng.x, rng.y, 6 + 18 * age, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,0,0,${(1 - age) * 0.65})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // Dots
    contacts.forEach(c => {
      if (c.dotBorn === null) return;
      const age = now - c.dotBorn;
      let alpha = 0;
      if (age < 2000) alpha = 1;
      else if (age < 2600) alpha = 1 - (age - 2000) / 600;
      else { c.dotBorn = null; return; }

      ctx.beginPath();
      ctx.arc(c.pos.x, c.pos.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(c.pos.x - 1.3, c.pos.y - 1.3, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.35})`;
      ctx.fill();
    });
  }

  let startTime = null;
  const pinged = new Set();
  function tick(ts) {
    if (!startTime) startTime = ts;
    const sweepDeg = (((ts - startTime) % PERIOD_MS / PERIOD_MS) * 360) % 360;

    contacts.forEach(c => {
      const diff = (sweepDeg - c.angle + 360) % 360;
      if (diff < PING_WIN && !pinged.has(c.id)) {
        pinged.add(c.id);
        c.dotBorn = performance.now();
        c.scannedOnce = true;
        spawnRing(c.pos.x, c.pos.y);
      }
      if (diff > 28) pinged.delete(c.id);
    });

    draw(ts);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
