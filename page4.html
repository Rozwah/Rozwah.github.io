<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #b2b2b2;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      perspective: 820px;
      perspective-origin: 50% 46%;
    }

    .perspective-wrap {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      transform: rotateX(73deg) rotateY(0deg) rotateZ(38deg);
      pointer-events: none;
    }

    .radar-stage {
      position: relative;
      width: 650px;
      height: 650px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar-disc {
      position: absolute;
      width: 638px; height: 638px;
      border-radius: 50%;
      background: transparent;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #000;
    }
    .ring-3 { width: 400px; height: 400px; }
    .ring-4 { width: 525px; height: 525px; }
    .ring-5 { width: 638px; height: 638px; }

    .crosshair {
      position: absolute;
      background: #000;
      -webkit-mask-image: radial-gradient(circle, transparent 138px, black 138px);
      mask-image: radial-gradient(circle, transparent 138px, black 138px);
    }
    .crosshair-h { width: 638px; height: 1px; }
    .crosshair-v { width: 1px; height: 638px; }

    .sweep-container {
      position: absolute;
      width: 638px; height: 638px;
      border-radius: 50%;
      overflow: hidden;
      animation: rotateSweep 10s linear infinite;
    }
    @keyframes rotateSweep {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .sweep-arm {
      position: absolute;
      top: 50%; left: 50%;
      width: 50%; height: 2px;
      transform-origin: 0% 50%;
      background: linear-gradient(to right, rgba(0,0,0,0.0), rgba(0,0,0,0.65));
    }
    .sweep-trail {
      position: absolute;
      width: 638px; height: 638px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(255,255,255,0.0)  0deg,
        rgba(255,255,255,0.0)  265deg,
        rgba(0,0,0,0.04)       302deg,
        rgba(0,0,0,0.12)       354deg,
        rgba(0,0,0,0.0)        360deg
      );
      animation: rotateSweep 10s linear infinite;
    }

    #pingCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 650px; height: 650px;
      z-index: 15;
    }

    .contact-anchor {
      position: absolute;
      width: 1px; height: 1px;
      background: transparent;
      transform: translate(-50%, -50%);
    }

    #uiLayer {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    .contact-zone {
      position: absolute;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: crosshair;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      outline: none;
    }

    .flat-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 4px 8px;
      border-radius: 2px;
      pointer-events: none;
      transform: translate(-50%, -160%);
      white-space: nowrap;
      display: none;
    }

    #mountainOverlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
      width: 350px;
    }
    #mountainOverlay img { width: 100%; height: auto; display: block; }

    .hud-label {
      position: absolute;
      font-size: 9px;
      letter-spacing: 0.20em;
      color: rgba(0,0,0,0.34);
      text-transform: uppercase;
      user-select: none;
    }
    .hud-n  { top: 2px;    left: 50%; transform: translateX(-50%); }
    .hud-s  { bottom: 2px; left: 50%; transform: translateX(-50%); }
    .hud-e  { right: 4px;  top: 50%;  transform: translateY(-50%); }
    .hud-w  { left: 4px;   top: 50%;  transform: translateY(-50%); }

    #infoPanel {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.20em;
      color: rgba(0,0,0,0.38);
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 110;
      transition: color 0.22s;
      pointer-events: none;
    }
    #infoPanel.active { color: rgba(0,0,0,0.70); }

    .top-decor {
      position: fixed;
      top: 20px;
      left: 0;
      width: 100%;
      z-index: 200;
      pointer-events: none;
    }
    .top-line-1 {
      width: 95%;
      margin: 0 auto;
      border-top: 2px solid #222;
    }
    .top-line-2 {
      width: 75%;
      margin: 20px auto;
      height: 2px;
      background: repeating-linear-gradient(to right, #222 0, #222 1px, transparent 1px, transparent 2.125px);
    }
    .top-line-3 {
      width: 100%;
      margin-top: 10px;
      border-top: 1px solid #222;
    }
    .bottom-decor {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 50px;
      z-index: 100;
      pointer-events: none;
    }
    .bottom-text {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      font-weight: bold;
      color: #111;
    }
  </style>
</head>
<body>

  <div class="top-decor">
    <div class="top-line-1"></div>
    <div class="top-line-2"></div>
    <div class="top-line-3"></div>
  </div>
  <div class="bottom-decor">
    <div class="bottom-text">あして</div>
    <div class="bottom-text">あして</div>
  </div>

  <div class="perspective-wrap">
    <div class="radar-stage" id="radarStage">
      <div class="radar-disc"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="ring ring-5"></div>
      <div class="crosshair crosshair-h"></div>
      <div class="crosshair crosshair-v"></div>
      <span class="hud-label hud-n">N</span>
      <span class="hud-label hud-s">S</span>
      <span class="hud-label hud-e">E</span>
      <span class="hud-label hud-w">W</span>
      <div class="sweep-trail"></div>
      <div class="sweep-container">
        <div class="sweep-arm"></div>
      </div>
      <canvas id="pingCanvas" width="650" height="650"></canvas>
    </div>
  </div>

  <div id="uiLayer"></div>

  <div id="mountainOverlay">
    <img src="BakuMayenIsland.png" alt="Baku Mayen Island" />
  </div>

  <div id="infoPanel">— select a contact —</div>

<script>
  // Stage 650px, center 325
  const STAGE = 650, CX = 325, CY = 325;
  const PERIOD_MS = 10000;
  const PING_WIN = 6;
  const DOT_R = 4.5;
  const uiLayer = document.getElementById('uiLayer');
  const radarStage = document.getElementById('radarStage');

  // Radii scaled 1.25x from originals
  const contacts = [
    { id:'01', angle: 22,  radius: 235, label: 'Dot 01' },
    { id:'02', angle: 80,  radius: 263, label: 'Dot 02' },
    { id:'03', angle: 140, radius: 219, label: 'Dot 03' },
    { id:'04', angle: 195, radius: 250, label: 'Dot 04' },
    { id:'05', angle: 255, radius: 228, label: 'Dot 05' },
    { id:'06', angle: 310, radius: 256, label: 'Dot 06' },
    { id:'07', angle: 52,  radius: 300, label: 'Dot 07' },
  ];

  function toXY(a, r) {
    const rad = (a - 90) * Math.PI / 180;
    return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
  }

  contacts.forEach(c => {
    c.pos = toXY(c.angle, c.radius);
    c.scannedOnce = false;
    c.dotBorn = null;

    const anchor = document.createElement('div');
    anchor.className = 'contact-anchor';
    anchor.style.left = c.pos.x + 'px';
    anchor.style.top = c.pos.y + 'px';
    radarStage.appendChild(anchor);
    c.anchorEl = anchor;

    const zone = document.createElement('button');
    zone.className = 'contact-zone';
    uiLayer.appendChild(zone);
    c.zoneEl = zone;

    const tip = document.createElement('div');
    tip.className = 'flat-tooltip';
    tip.textContent = c.label;
    uiLayer.appendChild(tip);
    c.tipEl = tip;

    zone.addEventListener('mouseenter', () => { if(c.scannedOnce) tip.style.display = 'block'; });
    zone.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    zone.addEventListener('click', () => {
      if (!c.scannedOnce) return;
      contacts.forEach(other => other.zoneEl.classList.remove('selected'));
      zone.classList.add('selected');
      const info = document.getElementById('infoPanel');
      info.textContent = `${c.label}  ·  BRG ${String(c.angle).padStart(3,'0')}°  ·  RNG ${c.radius}M`;
      info.classList.add('active');
    });
  });

  function syncUI() {
    contacts.forEach(c => {
      const rect = c.anchorEl.getBoundingClientRect();
      c.zoneEl.style.left = rect.left + rect.width/2 + 'px';
      c.zoneEl.style.top = rect.top + rect.height/2 + 'px';
      if (c.tipEl.style.display === 'block') {
        c.tipEl.style.left = rect.left + rect.width/2 + 'px';
        c.tipEl.style.top = rect.top + 'px';
      }
    });
    requestAnimationFrame(syncUI);
  }
  syncUI();

  const canvas = document.getElementById('pingCanvas');
  const ctx = canvas.getContext('2d');
  const rings = [];

  function spawnRing(x, y) {
    rings.push({ x, y, born: performance.now() });
  }

  function draw(now) {
    ctx.clearRect(0, 0, STAGE, STAGE);

    for (let i = rings.length - 1; i >= 0; i--) {
      const rng = rings[i];
      const age = (now - rng.born) / 700;
      if (age >= 1) { rings.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(rng.x, rng.y, 6 + 18 * age, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,0,0,${(1 - age) * 0.65})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    contacts.forEach(c => {
      if (c.dotBorn === null) return;
      const age = now - c.dotBorn;
      let alpha = 0;
      if (age < 2000) alpha = 1;
      else if (age < 2600) alpha = 1 - (age - 2000) / 600;
      else { c.dotBorn = null; return; }

      // Pure white dot
      ctx.beginPath();
      ctx.arc(c.pos.x, c.pos.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
  }

  let startTime = null;
  const pinged = new Set();
  function tick(ts) {
    if (!startTime) startTime = ts;
    const sweepDeg = (((ts - startTime) % PERIOD_MS / PERIOD_MS) * 360) % 360;

    contacts.forEach(c => {
      const diff = (sweepDeg - c.angle + 360) % 360;
      if (diff < PING_WIN && !pinged.has(c.id)) {
        pinged.add(c.id);
        c.dotBorn = performance.now();
        c.scannedOnce = true;
        spawnRing(c.pos.x, c.pos.y);
      }
      if (diff > 28) pinged.delete(c.id);
    });

    draw(ts);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
