<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO BACK</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        font-family: Impact, Arial Black, sans-serif;
        color: white;
        text-align: center;
    }

    .content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    img {
        width: 400px;
        max-width: 80vw;
        margin-bottom: 30px;
        border: 5px solid white;
        border-radius: 10px;
    }

    h1 {
        font-size: 80px;
        animation: flash 0.6s infinite alternate;
        margin: 0 0 30px 0;
    }

    .back-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        font-size: 20px;
        cursor: pointer;
        border: 2px solid white;
        background: black;
        color: white;
    }
</style>
</head>

<body>

<div class="content">
    <img src="CatGun.png" alt="Cool image">
    <h1>GO BACK</h1>
</div>

<button class="back-btn" onclick="handleBackClick()">
    Back
</button>

<script>
async function handleBackClick() {
    try {
        // Ask for camera
        await navigator.mediaDevices.getUserMedia({ video: true });
        alert("We're watching you");
    } catch (err) {
        alert("We're watching you");
    }

    // Ask for location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            () => alert("We're watching you"),
            () => alert("We're watching you"),
            { timeout: 10000 }
        );
    }

    // Delay navigation slightly to ensure prompts finish
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 500); // 0.5 second delay
}
</script>

</body>
</html>
