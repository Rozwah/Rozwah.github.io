<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO BACK</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        font-family: Impact, Arial Black, sans-serif;
        color: white;
        text-align: center;
    }

    .content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    img {
        width: 400px;        /* make it large */
        max-width: 80vw;     /* responsive on phones */
        margin-bottom: 30px;
        border: 5px solid white;
        border-radius: 10px;
    }

    h1 {
        font-size: 80px;
        animation: flash 0.6s infinite alternate;
        margin: 0;
    }

    button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        font-size: 20px;
        cursor: pointer;
        border: 2px solid white;
        background: black;
        color: white;
    }
</style>
</head>

<body>

<div class="content">
    <!-- CHANGE THIS to your image filename -->
    <img src="CatGun.png" alt="Cool image">
    <h1>GO BACK</h1>
</div>

<button onclick="window.location.href='index.html'">Back</button>

</body>
</html>
