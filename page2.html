<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CatGun Dance</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:radial-gradient(circle at center, #222, #000);
        overflow:hidden;
        font-family:Arial, Helvetica, sans-serif;
        cursor: url("CatCursor.png"), auto; /* Custom cursor */
    }

    #catgun{
        width:220px;
        animation: dance 2.2s infinite ease-in-out;
    }

    @keyframes dance {
        0%   { transform: translateY(0) rotate(0deg) scale(1); }
        15%  { transform: translateY(-40px) rotate(-15deg) scale(1.1); }
        30%  { transform: translateY(0) rotate(15deg) scale(1); }
        45%  { transform: translateY(-30px) rotate(-25deg) scale(1.1); }
        60%  { transform: translateY(0) rotate(25deg) scale(1); }
        75%  { transform: translateY(-20px) rotate(-10deg) scale(1.05); }
        100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    button{
        margin-top:40px;
        padding:12px 28px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#fff;
        transition:transform 0.2s ease, background 0.2s ease;
    }

    button:hover{
        transform:scale(1.1);
        background:#ddd;
    }
</style>
</head>

<body>

<img src="CatSmile.png" id="catgun" alt="CatGun Dancing">

<button onclick="goBack()">Go Back</button>

<script>
function goBack(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
