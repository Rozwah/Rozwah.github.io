<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        :root {
            --shoulder-top: 42%;
            --shoulder-left: 58%;
            /* Tweak this if the arm is naturally tilted in your PNG */
            --arm-file-correction: 75deg; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; 
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #background-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 56.25vw; 
            min-height: 100vh;
            min-width: 177.78vh; 
            background: url('background.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        #shoulder-pivot {
            position: absolute;
            top: var(--shoulder-top);
            left: var(--shoulder-left);
            width: 0; height: 0;
        }

        #cat-arm {
            position: absolute;
            width: 11vh;   
            height: 80vh; 
            left: -12.5vh; /* Your requested offset */
            bottom: 0; 
            background: url('catarm.png') no-repeat bottom center;
            background-size: contain;
            
            /* CHANGED: Rotating from the horizontal center (50%) 
               makes the math consistent across all ratios */
            transform-origin: 50% 100%; 
            
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; 
            z-index: 10;
        }

        .nav-arc {
            position: fixed;
            top: 18%;
            right: 5%;
            display: flex;
            flex-direction: column;
            gap: 3vh;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #d1d9e2; 
            font-size: clamp(1.8rem, 7vh, 4.5rem); 
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            padding: 10px 20px;
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.1) translateX(-10px);
        }

        #link1 { margin-right: 6vmin; }
        #link2 { margin-right: 4vmin; }
        #link3 { margin-right: 2vmin; }
        #link4 { margin-right: 0; }

        @media (max-aspect-ratio: 1/1) {
            .nav-arc { top: 15%; right: 4%; }
            .menu-btn { font-size: 10vw; } 
        }
    </style>
</head>
<body>

    <div id="background-layer">
        <div id="shoulder-pivot">
            <div id="cat-arm"></div>
        </div>
    </div>

    <nav class="nav-arc">
        <a href="page2.html" class="menu-btn" id="link1">projects</a>
        <a href="page3.html" class="menu-btn" id="link2">art</a>
        <a href="page4.html" class="menu-btn" id="link3">files</a>
        <a href="page5.html" class="menu-btn" id="link4">etc</a>
    </nav>

    <script>
        const pivot = document.getElementById('shoulder-pivot');
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        
        const restAngle = 16.0;  
        const correction = 75; // The constant angle correction for your PNG

        // Set initial rest state
        arm.style.transform = `rotate(${restAngle}deg)`;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // 1. Get the current absolute position of the shoulder pivot
                const pRect = pivot.getBoundingClientRect();
                const pX = pRect.left;
                const pY = pRect.top;

                // 2. Get the target point (the left edge center of the button)
                const bRect = btn.getBoundingClientRect();
                const bX = bRect.left; 
                const bY = bRect.top + (bRect.height / 2);

                // 3. DERIVED EQUATION
                // We calculate the angle of the vector from Pivot to Button
                // Angle (radians) = atan2(Δy, Δx)
                const dx = bX - pX;
                const dy = bY - pY;
                const angleRad = Math.atan2(dy, dx);
                
                // Convert to degrees
                const angleDeg = angleRad * (180 / Math.PI);
                
                // Final Rotation = Calculated Angle + PNG Correction
                // This ensures the "line" of the arm always intersects the button
                arm.style.transform = `rotate(${angleDeg + correction}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
