<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #scene-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* If your cat's shoulder moves too much when resizing the browser, 
               you might need to change 'cover' to 'contain' or '100% 100%' */
            background: url('background.png') no-repeat center center;
            background-size: cover; 
        }

        /* --- 1. THE INVISIBLE PIVOT POINT --- */
        /* This is the exact location of the cat's shoulder on the screen. */
        #shoulder-pivot {
            position: absolute;
            
            /* TWEAK THESE to place the pivot exactly over your background cat's shoulder */
            top: 60vh;   
            left: 35vw;  
            
            width: 0; 
            height: 0;
            z-index: 10;
        }

        /* --- 2. THE VISUAL CAT ARM --- */
        #cat-arm {
            position: absolute;
            width: 15vw;       
            height: 120vh;     
            
            left: -7.5vw;      
            
            /* CHANGE 1: Anchor the arm to the bottom of the pivot point */
            bottom: 0;            

            /* CHANGE 2: Align the background image to the bottom */
            background: url('catarm.png') no-repeat bottom center;
            background-size: contain;
            
            /* CHANGE 3: Pivot from the bottom center */
            transform-origin: bottom center; 
            
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            pointer-events: none;
        }

        /* --- NAVIGATION LINKS --- */
        .nav-arc {
            position: absolute;
            top: 15%;
            right: 8%;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #5d6d7e; 
            font-size: 8vh;  
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            /* Add a tiny padding to make hover hitboxes more forgiving */
            padding: 10px; 
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.05) translateX(-10px);
        }

        /* Handwritten-style Arc Offsets */
        #link1 { margin-right: 60px; }
        #link2 { margin-right: 30px; }
        #link3 { margin-right: 10px; }
        #link4 { margin-right: 0px; }

    </style>
</head>
<body>

    <div id="scene-container">
        <div id="shoulder-pivot">
            <div id="cat-arm"></div>
        </div>

        <nav class="nav-arc">
            <a href="page2.html" class="menu-btn" id="link1">projects</a>
            <a href="page3.html" class="menu-btn" id="link2">art</a>
            <a href="page4.html" class="menu-btn" id="link3">files</a>
            <a href="page5.html" class="menu-btn" id="link4">etc</a>
        </nav>
    </div>

    <script>
        const pivot = document.getElementById('shoulder-pivot');
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        
        // This is the angle the arm sits at when not hovering
        const restAngle = -35; 
        arm.style.transform = `rotate(${restAngle}deg)`;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // 1. Get the coordinates of the static pivot point (not the rotating arm)
                const pivotRect = pivot.getBoundingClientRect();
                const shoulderX = pivotRect.left;
                const shoulderY = pivotRect.top;

                // 2. Get the coordinates of the button being hovered
                const btnRect = btn.getBoundingClientRect();
                const targetX = btnRect.left; 
                const targetY = btnRect.top + (btnRect.height / 2); // Middle-left of the text

                // 3. Do the trig math
                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                // 4. Rotate it! (-90 assumes your catarm.png is pointing straight down in the file)
                arm.style.transform = `rotate(${angle - 65}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                // Snap back to resting position
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
