<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home</title>

<style>
    body{
        margin:0;
        height:100vh;
        overflow:hidden;
        background:#111;
        cursor:crosshair;
    }

    #catgun{
        position:absolute;
        width:200px;
        user-select:none;
        pointer-events:auto;
    }
</style>
</head>

<body>

<img src="CatGun.png" id="catgun" alt="CatGun">

<script>
const img = document.getElementById("catgun");

// start position
let x = window.innerWidth * 0.2;
let y = window.innerHeight * 0.4;

let vx = 0;
let vy = 0;

img.style.left = x + "px";
img.style.top = y + "px";

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate(){
    const rect = img.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const dx = centerX - mouseX;
    const dy = centerY - mouseY;
    const distance = Math.sqrt(dx*dx + dy*dy);

    // direction away from cursor
    const dirX = dx / distance;
    const dirY = dy / distance;

    // SPEED LOGIC
    let speed;

    if(distance < 80){
        // cursor is on it -> slow movement
        speed = 1.2;
    }
    else if(distance < 200){
        // being chased -> fast acceleration
        speed = 12;
    }
    else{
        // idle drift
        speed = 0.5;
    }

    vx += dirX * speed;
    vy += dirY * speed;

    // friction
    vx *= 0.9;
    vy *= 0.9;

    x += vx;
    y += vy;

    // bounce off walls
    if(x < 0) x = 0;
    if(y < 0) y = 0;
    if(x > window.innerWidth - rect.width) x = window.innerWidth - rect.width;
    if(y > window.innerHeight - rect.height) y = window.innerHeight - rect.height;

    img.style.left = x + "px";
    img.style.top = y + "px";

    requestAnimationFrame(animate);
}

animate();

// click to go to next page
img.addEventListener("click", ()=>{
    window.location.href = "page2.html";
});
</script>

</body>
</html>
