<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        :root {
            /* The blue from your sketch */
            --janky-blue: #88c0d0;
            /* How thick the arm should be relative to the screen width */
            --arm-thickness: 12%; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Brush Script MT', cursive, sans-serif;
        }

        /* This container locks the 5049x5254 proportions.
           Everything inside (arm, buttons) uses % of THIS container,
           so they never move out of place.
        */
        #master-stage {
            position: relative;
            aspect-ratio: 5049 / 5254;
            height: 100vh;
            width: auto;
            background: url('background.png') no-repeat center center;
            background-size: contain;
        }

        /* --- THE ARM --- */
        #cat-arm {
            position: absolute;
            
            /* POSITION: Percentage of the background where the shoulder sits */
            top: 48.5%;  
            left: 45.8%; 

            /* SIZE: This makes your 200px image appear large */
            width: var(--arm-thickness); 
            height: 35%; /* Long enough to reach the buttons */

            background: url('catarm.png') no-repeat top center;
            background-size: contain; /* Scales the small image up to fill the width */
            
            /* Pivot point: Top Center of the arm image */
            transform-origin: top center; 
            transform: rotate(-135deg);
            
            /* Smooth movement */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            pointer-events: none; /* Mouse goes 'through' the arm to hit buttons */
        }

        /* --- THE BUTTONS --- */
        .nav-menu {
            position: absolute;
            top: 15%;
            right: 5%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        .btn {
            color: var(--janky-blue);
            font-size: 5cvi; /* Responsive font based on container size */
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            padding: 10px;
        }

        .btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        /* Janky Arc Offsets */
        #b1 { margin-right: 60px; }
        #b2 { margin-right: 35px; }
        #b3 { margin-right: 15px; }

    </style>
</head>
<body>

    <div id="master-stage">
        <div id="cat-arm"></div>

        <nav class="nav-menu">
            <a href="page2.html" class="btn" id="b1">projects</a>
            <a href="page3.html" class="btn" id="b2">art</a>
            <a href="page4.html" class="btn" id="b3">files</a>
            <a href="page5.html" class="btn" id="b4">etc</a>
        </nav>
    </div>

    <script>
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.btn');
        const defaultRotation = -135;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const armRect = arm.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();

                // 1. Find the shoulder (Pivot Point)
                const shoulderX = armRect.left + (armRect.width / 2);
                const shoulderY = armRect.top;

                // 2. Find the Target (Button Center)
                const targetX = btnRect.left;
                const targetY = btnRect.top + (btnRect.height / 2);

                // 3. The Math
                // We calculate the angle $\theta$ using the arc tangent:
                // $$\theta = \operatorname{atan2}(y_{target} - y_{shoulder}, x_{target} - x_{shoulder})$$
                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);

                // Offset by 90 because the arm image is drawn vertically
                arm.style.transform = `rotate(${angle - 90}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${defaultRotation}deg)`;
            });
        });
    </script>
</body>
</html>
