<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        :root {
            /* We define the original image ratio here to keep everything proportional */
            --img-width: 5049;
            --img-height: 5254;
            --aspect-ratio: calc(var(--img-width) / var(--img-height));
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; /* Deep void black */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        /* This container maintains your drawing's proportions regardless of screen size */
        #scene-container {
            position: relative;
            /* This math ensures the image always fits the screen without cutting off */
            width: min(100vw, calc(100vh * var(--aspect-ratio)));
            height: min(100vh, calc(100vw / var(--aspect-ratio)));
            
            background: url('background.png') no-repeat center center;
            background-size: 100% 100%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* THE ARM
           Since the arm is 200px and the background is 5049px, 
           the arm is roughly 4% of the width. */
        #cat-arm {
            position: absolute;
            
            /* --- POSITIONING: Adjust these % to pin the shoulder --- */
            top: 48.5%;  
            left: 46.2%; 

            /* --- SCALING: Adjust this % to match the body size --- */
            width: 4.5%; 
            height: 25%; /* Making the box tall so the arm has room to swing */

            background: url('catarm.png') no-repeat top center;
            background-size: contain;
            
            transform-origin: top center; 
            transform: rotate(-140deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Added a little 'bounce' */
            z-index: 10;
            pointer-events: none;
            
            /* border: 1px solid red; /* Uncomment to see the shoulder pivot point while testing */
        }

        /* NAVIGATION ARC */
        .nav-arc {
            position: absolute;
            top: 15%;
            right: 5%;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #839496; /* Desaturated janky blue */
            font-size: clamp(1.5rem, 5vh, 4rem); /* Responsive font size */
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.1) translateX(-10px);
        }

        /* The 'Janky' Arc offsets */
        #link1 { margin-right: 10%; }
        #link2 { margin-right: 5%; }
        #link3 { margin-right: 2%; }
        #link4 { margin-right: 0%; }

    </style>
</head>
<body>

    <div id="scene-container">
        <div id="cat-arm"></div>

        <nav class="nav-arc">
            <a href="page2.html" class="menu-btn" id="link1">projects</a>
            <a href="page3.html" class="menu-btn" id="link2">art</a>
            <a href="page4.html" class="menu-btn" id="link3">files</a>
            <a href="page5.html" class="menu-btn" id="link4">etc</a>
        </nav>
    </div>

    <script>
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        const restAngle = -140;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const armRect = arm.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();

                // Shoulder is top-center of the arm div
                const shoulderX = armRect.left + (armRect.width / 2);
                const shoulderY = armRect.top;

                // Target is center of the button
                const targetX = btnRect.left + (btnRect.width / 2);
                const targetY = btnRect.top + (btnRect.height / 2);

                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                // Offset by 90 because the arm image faces "down" (0 degrees)
                arm.style.transform = `rotate(${angle - 90}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
