<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio - Fixed Scaling</title>
    <style>
        /* 1. SETUP THE SCENE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117; /* Dark backup color */
            overflow: hidden;
            /* Using standard web-safe cursive fallback */
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('background.png') no-repeat center center;
            background-size: cover; /* Background scales to fit screen */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* -------------------------------------------------------------
           2. THE FIXED CAT ARM (SCALING APPLIED)
           Adjust these values based on your specific images and desired size.
           ------------------------------------------------------------- */
        #cat-arm {
            position: absolute;
            
            /* A. SIZE THE ARM (Using % of viewport height) */
            /* In your original drawing, the arm is about half the height of the screen. */
            height: 45vh; /* Increase/decrease this % to make the arm bigger/smaller */
            
            /* Width must be wide enough to contain your image without cropping. */
            /* Keeping it a large, safe proportion (e.g., 1/2 of height) is safest. */
            width: 22vh;
            
            /* B. POSITION THE ARM (Adjust to pin onto the cat's shoulder) */
            top: 48%;     /* Adjust this % to move the shoulder up or down */
            left: 44.5%;  /* Adjust this % to move the shoulder left or right */
            
            /* YOUR IMAGE HERE */
            background: url('catarm.png') no-repeat top center;
            background-size: contain; /* Ensure the image fits inside the box */
            
            /* Sets the pivot point to the shoulder (top center of this box) */
            transform-origin: top center; 
            
            /* Default pose (pointing slightly backward/up) */
            transform: rotate(-130deg);
            transition: transform 0.3s ease-out; /* Smooth transition */
            z-index: 10;
            
            /* Prevents the arm element from accidentally blocking button clicks */
            pointer-events: none; 

            /* --- DEBUG ONLY: Remove '/* ' at the start of the next line to see the 'box' for alignment --- * /
            border: 1px solid rgba(255,0,0,0.5); /* Helps you see the top-center pivot point */
        }

        /* 3. THE BUTTONS */
        .nav-container {
            position: absolute;
            right: 10%;
            top: 20%;
            display: flex;
            flex-direction: column;
            gap: 50px;
            align-items: flex-end;
        }

        .menu-item {
            color: #5d6d7e; /* Janky blue color from original drawing */
            font-size: 3.5rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            padding-right: 20px;
        }

        .menu-item:hover {
            color: #ffffff;
            transform: translateX(-10px);
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Manual offsets to maintain the "janky" handwritten arc look */
        #item-art   { margin-right: 40px; }
        #item-files { margin-right: 80px; }
        #item-etc   { margin-right: 110px; }

    </style>
</head>
<body>

    <div id="canvas">
        <div id="cat-arm"></div>

        <div class="nav-container">
            <a href="page2.html" class="menu-item" id="item-projects">Projects</a>
            <a href="page3.html" class="menu-item" id="item-art">Art</a>
            <a href="page4.html" class="menu-item" id="item-files">Files</a>
            <a href="page5.html" class="menu-item" id="item-etc">Etc.</a>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT: Calulates and applies the rotation angle ---
        const arm = document.getElementById('cat-arm');
        const items = document.querySelectorAll('.menu-item');
        const defaultRotation = -130; // Resting pose angle

        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                // Get the accurate current screen location of the shoulder (the rotation point)
                const armBox = arm.getBoundingClientRect();
                const shoulderX = armBox.left + (armBox.width / 2);
                const shoulderY = armBox.top; // The pivot is at the top of the element

                // Get the center of the hovered button
                const itemBox = item.getBoundingClientRect();
                // Pointing to the 'center' of the button is usually best
                const targetX = itemBox.left + (itemBox.width / 2); 
                const targetY = itemBox.top + (itemBox.height / 2);

                // Trigonometry: find the angle from the shoulder to the button
                const deltaX = targetX - shoulderX;
                const deltaY = targetY - shoulderY;
                const radians = Math.atan2(deltaY, deltaX);
                let degrees = radians * (180 / Math.PI);

                // Adjust by -90 degrees. CSS rotation 0 is straight down, but our
                // geometry calculation uses 'right' as 0. This maps them together.
                arm.style.transform = `rotate(${degrees - 90}deg)`;
            });

            // When mouse leaves the button, return arm to resting pose
            item.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${defaultRotation}deg)`;
            });
        });
    </script>
</body>
</html>
