<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home</title>

<style>
    body{
        margin:0;
        height:100vh;
        overflow:hidden;
        background:#111;
        cursor: url('CatCursor.png'), auto; /* Custom cursor */
    }

    #catgun{
        position:absolute;
        width:200px;
        user-select:none;
        pointer-events:auto;
    }
</style>
</head>

<body>

<img src="CatGun.png" id="catgun" alt="CatGun">

<script>
const img = document.getElementById("catgun");
let x = window.innerWidth * 0.2;
let y = window.innerHeight * 0.4;
let vx = 0;
let vy = 0;

img.style.left = x + "px";
img.style.top = y + "px";

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate(){
    const rect = img.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const dx = centerX - mouseX;
    const dy = centerY - mouseY;
    const distance = Math.sqrt(dx*dx + dy*dy) || 1;

    const dirX = dx / distance;
    const dirY = dy / distance;

    let speed;
    if(distance < 80){ speed = 1.2; }
    else if(distance < 200){ speed = 14; }
    else{ speed = 0.6; }

    vx += dirX * speed;
    vy += dirY * speed;

    vx *= 0.95;
    vy *= 0.95;

    x += vx;
    y += vy;

    const bounceBoost = 5.25;

    if(x <= 0){ x = 0; vx = Math.abs(vx)*bounceBoost; }
    if(x >= window.innerWidth - rect.width){ x = window.innerWidth - rect.width; vx = -Math.abs(vx)*bounceBoost; }
    if(y <= 0){ y = 0; vy = Math.abs(vy)*bounceBoost; }
    if(y >= window.innerHeight - rect.height){ y = window.innerHeight - rect.height; vy = -Math.abs(vy)*bounceBoost; }

    img.style.left = x + "px";
    img.style.top = y + "px";

    requestAnimationFrame(animate);
}

animate();

img.addEventListener("click", ()=>{
    window.location.href = "page2.html";
});
</script>

</body>
</html>
