<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <style>
        /* 1. SETUP THE SCENE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117; /* Dark backup color */
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* YOUR IMAGE HERE */
            background: url('background.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. THE CAT ARM 
           Adjust 'top' and 'left' to align the shoulder with the cat body */
        #cat-arm {
            position: absolute;
            top: 48%;  /* Adjust this % to move arm up/down */
            left: 45%; /* Adjust this % to move arm left/right */
            
            width: 40px;   /* Width of your catarm.png */
            height: 200px; /* Length of your catarm.png */
            
            /* YOUR IMAGE HERE */
            background: url('catarm.png') no-repeat top center;
            background-size: contain;
            
            /* The pivot point of the rotation (the shoulder) */
            transform-origin: top center; 
            
            /* Default pose */
            transform: rotate(-130deg);
            transition: transform 0.3s ease-out;
            z-index: 10;
            pointer-events: none; /* Prevents arm from blocking button clicks */
            
            /* Temporary placeholder color if image is missing */
            border-left: 2px dashed rgba(255,255,255,0.2); 
        }

        /* 3. THE BUTTONS */
        .nav-container {
            position: absolute;
            right: 10%;
            top: 20%;
            display: flex;
            flex-direction: column;
            gap: 50px;
            align-items: flex-end;
        }

        .menu-item {
            color: #5d6d7e; /* Janky blue color from your drawing */
            font-size: 3.5rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            padding-right: 20px;
        }

        .menu-item:hover {
            color: #ffffff;
            transform: translateX(-10px);
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Manual offsets to create the arc look */
        #item-art   { margin-right: 40px; }
        #item-files { margin-right: 80px; }
        #item-etc   { margin-right: 110px; }

    </style>
</head>
<body>

    <div id="canvas">
        <div id="cat-arm"></div>

        <div class="nav-container">
            <a href="page2.html" class="menu-item" id="item-projects">Projects</a>
            <a href="page3.html" class="menu-item" id="item-art">Art</a>
            <a href="page4.html" class="menu-item" id="item-files">Files</a>
            <a href="page5.html" class="menu-item" id="item-etc">Etc.</a>
        </div>
    </div>

    <script>
        const arm = document.getElementById('cat-arm');
        const items = document.querySelectorAll('.menu-item');
        const defaultRotation = -130;

        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                // Get coordinates of the shoulder (top center of arm div)
                const armBox = arm.getBoundingClientRect();
                const shoulderX = armBox.left + (armBox.width / 2);
                const shoulderY = armBox.top;

                // Get coordinates of the button
                const itemBox = item.getBoundingClientRect();
                const targetX = itemBox.left; 
                const targetY = itemBox.top + (itemBox.height / 2);

                // Math to find the angle
                const deltaX = targetX - shoulderX;
                const deltaY = targetY - shoulderY;
                const radians = Math.atan2(deltaY, deltaX);
                let degrees = radians * (180 / Math.PI);

                // CSS rotation 0 is pointing down, so we adjust by 90 degrees
                arm.style.transform = `rotate(${degrees - 90}deg)`;
            });

            item.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${defaultRotation}deg)`;
            });
        });
    </script>
</body>
</html>
