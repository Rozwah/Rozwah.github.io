<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        /* 1. SETUP CENTERING */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        /* 2. THE ASPECT RATIO BOX 
           This box stays 16:9 and scales to fit the screen without cropping. */
        #scene-container {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100vw;
            max-height: 100vh;
            max-width: 177.78vh; /* 16/9 of the height */
            background: url('background.png') no-repeat center center;
            background-size: contain; 
        }

        /* 3. CONVERT UNITS TO PERCENTAGES 
           Everything inside now uses % of the #scene-container, NOT the screen. */
        #shoulder-pivot {
            position: absolute;
            top: 42%;    /* Changed from vh */
            left: 58%;   /* Changed from vw */
            width: 0; 
            height: 0;
            z-index: 10; 
        }

        #cat-arm {
            position: absolute;
            width: 6.3%;   /* Changed from vw */
            height: 80.7%; /* Changed from vh */
            left: -6.8%;   /* Changed from vw */
            bottom: 0;          

            background: url('catarm.png') no-repeat bottom center;
            background-size: contain;
            transform-origin: 25% 100%; 
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 10;
            pointer-events: none; 
        }

        .nav-arc {
            position: absolute;
            top: 15%;
            right: 8%;
            display: flex;
            flex-direction: column;
            gap: 4%; /* Percent of container height */
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #d1d9e2; 
            /* Using 'cqw' or 'vh' here is okay, but 8% of container height is safer */
            font-size: 5vw;  
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            padding: 0.5% 1%; 
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.05) translateX(-10px);
        }

        /* Horizontal offsets using percentages to maintain the "arc" */
        #link1 { margin-right: 4vw; }
        #link2 { margin-right: 2vw; }
        #link3 { margin-right: 0.5vw; }
        #link4 { margin-right: 0px; }

    </style>
</head>
<body>

    <div id="scene-container">
        <div id="shoulder-pivot">
            <div id="cat-arm"></div>
        </div>

        <nav class="nav-arc">
            <a href="page2.html" class="menu-btn" id="link1">projects</a>
            <a href="page3.html" class="menu-btn" id="link2">art</a>
            <a href="page4.html" class="menu-btn" id="link3">files</a>
            <a href="page5.html" class="menu-btn" id="link4">etc</a>
        </nav>
    </div>

    <script>
        const pivot = document.getElementById('shoulder-pivot');
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        
        const restAngle = 16.0;  
        arm.style.transform = `rotate(${restAngle}deg)`;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const pivotRect = pivot.getBoundingClientRect();
                const shoulderX = pivotRect.left;
                const shoulderY = pivotRect.top;

                const btnRect = btn.getBoundingClientRect();
                const targetX = btnRect.left; 
                const targetY = btnRect.top + (btnRect.height / 2);

                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                const angleOffset = 72.5; 
                arm.style.transform = `rotate(${angle + angleOffset}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
