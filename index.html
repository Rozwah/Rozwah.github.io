<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catch the CatGun</title>

<style>
    body{
        margin:0;
        height:100vh;
        overflow:hidden;
        background:#111;
        cursor:crosshair;
    }

    #catgun{
        position:absolute;
        width:200px;
        transition: top 0.25s ease, left 0.25s ease;
        user-select:none;
    }
</style>
</head>

<body>

<img src="CatGun.png" id="catgun" alt="CatGun">

<script>
const img = document.getElementById("catgun");

let side = 0;

// start position
img.style.top = "40%";
img.style.left = "10%";

document.addEventListener("mousemove", (e) => {
    const rect = img.getBoundingClientRect();

    const distX = Math.abs(e.clientX - (rect.left + rect.width/2));
    const distY = Math.abs(e.clientY - (rect.top + rect.height/2));

    // if cursor gets close, move image
    if(distX < 150 && distY < 150){
        side = 1 - side;

        if(side === 0){
            img.style.left = "10%";
            img.style.top = Math.random()*70 + "%";
        } else {
            img.style.left = "70%";
            img.style.top = Math.random()*70 + "%";
        }
    }
});

// if somehow clicked
img.addEventListener("click", () => {
    window.location.href = "page2.html";
});
</script>

</body>
</html>
