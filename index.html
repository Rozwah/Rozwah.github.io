<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            overflow: hidden;
            /* Using a bold cursive font to match your 'janky' style */
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #scene-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* This makes the image fill the screen completely again */
            background: url('background.png') no-repeat center center;
            background-size: cover; 
        }

        /* --- THE CAT ARM (ENLARGED) --- */
        #cat-arm {
            position: absolute;
            
            /* ADJUST THESE TWO to move the shoulder joint */
            top: 48%;  
            left: 45%; 

            /* WIDTH: Increased this to make the arm thick like the text */
            width: 100vh; 
            /* HEIGHT: Adjusted to keep the arm long enough to point */
            height: 400vh; 

            background: url('catarm.png') no-repeat top center;
            background-size: contain;
            
            /* Pivot point remains the shoulder */
            transform-origin: top center; 
            transform: rotate(-130deg);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 10;
            pointer-events: none;
        }

        /* --- NAVIGATION LINKS --- */
        .nav-arc {
            position: absolute;
            top: 15%;
            right: 8%;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #5d6d7e; /* The blue color from your drawing */
            font-size: 8vh;  /* Large text size */
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.05) translateX(-10px);
        }

        /* Handwritten-style Arc Offsets */
        #link1 { margin-right: 60px; }
        #link2 { margin-right: 30px; }
        #link3 { margin-right: 10px; }
        #link4 { margin-right: 0px; }

    </style>
</head>
<body>

    <div id="scene-container">
        <div id="cat-arm"></div>

        <nav class="nav-arc">
            <a href="page2.html" class="menu-btn" id="link1">projects</a>
            <a href="page3.html" class="menu-btn" id="link2">art</a>
            <a href="page4.html" class="menu-btn" id="link3">files</a>
            <a href="page5.html" class="menu-btn" id="link4">etc</a>
        </nav>
    </div>

    <script>
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        const restAngle = -130;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const armRect = arm.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();

                // Shoulder location
                const shoulderX = armRect.left + (armRect.width / 2);
                const shoulderY = armRect.top;

                // Button location (pointing to the left side of the text)
                const targetX = btnRect.left;
                const targetY = btnRect.top + (btnRect.height / 2);

                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                // Adjusting by 90 because our 'arm' image is vertical
                arm.style.transform = `rotate(${angle - 90}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
