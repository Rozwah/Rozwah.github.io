<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HENRY</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        overflow: hidden;
        font-family: Impact, Arial Black, sans-serif;
    }

    .henry {
        font-size: 15vw;
        font-weight: 900;
        letter-spacing: 10px;
        text-transform: uppercase;
        animation: colorShift 1s infinite, shake 0.15s infinite;
        text-shadow:
            0 0 10px red,
            0 0 20px orange,
            0 0 40px yellow,
            0 0 80px lime,
            0 0 120px cyan;
    }

    @keyframes colorShift {
        0%   { color: red; }
        20%  { color: orange; }
        40%  { color: yellow; }
        60%  { color: lime; }
        80%  { color: cyan; }
        100% { color: red; }
    }

    @keyframes shake {
        0% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(-5px, 5px) rotate(-2deg); }
        50% { transform: translate(5px, -5px) rotate(2deg); }
        75% { transform: translate(-5px, -5px) rotate(-2deg); }
        100% { transform: translate(5px, 5px) rotate(2deg); }
    }
</style>
</head>

<body>
    <div class="henry">HENRY IS GAY</div>
</body>
</html>
