<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; 
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        #scene-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('background.png') no-repeat center center;
            background-size: cover; 
        }

        /* --- 1. THE INVISIBLE SHOULDER PIVOT POINT --- */
        /* LOCKED: Your perfect positioning preserved */
        #shoulder-pivot {
            position: absolute;
            top: 44vh;   
            left: 58.0vw;  
            
            width: 0; 
            height: 0;
            z-index: 10; 
        }

        /* --- 2. THE VISUAL CAT ARM --- */
        #cat-arm {
            position: absolute;
            
            /* LOCKED: Your perfect sizing and positioning preserved */
            width: 6.30vw;       
            height: 46.70vh;     
            left: -7.5vw;      
            bottom: 0;         

            background: url('catarm.png') no-repeat bottom center;
            background-size: contain;
            
            /* --- ADDITION #1: THE PIVOT POINT CONTROL --- */
            /* If it rotates weirdly, tweak these percentages! 
               Left number = Horizontal pivot (50% is dead center)
               Right number = Vertical pivot (100% is the absolute bottom edge) */
            transform-origin: 50% 90%; 
            
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 10;
            pointer-events: none; 
        }

        /* --- NAVIGATION LINKS --- */
        .nav-arc {
            position: absolute;
            top: 15%;
            right: 8%;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #d1d9e2; 
            font-size: 8vh;  
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            padding: 10px; 
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.05) translateX(-10px);
        }

        #link1 { margin-right: 60px; }
        #link2 { margin-right: 30px; }
        #link3 { margin-right: 10px; }
        #link4 { margin-right: 0px; }

    </style>
</head>
<body>

    <div id="scene-container">
        <div id="shoulder-pivot">
            <div id="cat-arm"></div>
        </div>

        <nav class="nav-arc">
            <a href="page2.html" class="menu-btn" id="link1">projects</a>
            <a href="page3.html" class="menu-btn" id="link2">art</a>
            <a href="page4.html" class="menu-btn" id="link3">files</a>
            <a href="page5.html" class="menu-btn" id="link4">etc</a>
        </nav>
    </div>

    <script>
        const pivot = document.getElementById('shoulder-pivot');
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        
        // LOCKED: Keeping your 16-degree resting angle
        const restAngle = 16.0;  
        arm.style.transform = `rotate(${restAngle}deg)`;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const pivotRect = pivot.getBoundingClientRect();
                const shoulderX = pivotRect.left;
                const shoulderY = pivotRect.top;

                const btnRect = btn.getBoundingClientRect();
                const targetX = btnRect.left; 
                const targetY = btnRect.top + (btnRect.height / 2);

                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                /* --- ADDITION #2: THE POINTING ANGLE CONTROL --- */
                /* If the hand doesn't point directly at the text, change this 90!
                   Try 85 to aim higher, or 95 to aim lower. */
                const angleOffset = 85; 
                
                arm.style.transform = `rotate(${angle + angleOffset}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
