<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; 
            overflow: hidden;
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive, sans-serif;
        }

        /* 1. THE VIEWPORT MASK 
           This clips the edges so the background "covers" the screen */
        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. THE SCALING CONTENT LAYER
           This container forces a 16:9 ratio and grows to 'cover' the viewport.
           Everything pinned to the background goes inside here. */
        #content-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* Logic: Always be at least 100% wide/high, 
               but maintain 16:9 aspect ratio */
            width: 100vw;
            height: 56.25vw; /* 9/16 = 0.5625 */
            min-height: 100vh;
            min-width: 177.78vh; /* 16/9 = 1.7778 */

            background: url('background.png') no-repeat center center;
            background-size: cover;
        }

        /* 3. PINNED COORDINATES (Using % of the 16:9 layer) */
        #shoulder-pivot {
            position: absolute;
            top: 42%;    
            left: 58%;  
            width: 0; 
            height: 0;
            z-index: 10; 
        }

        #cat-arm {
            position: absolute;
            /* Percentages relative to the background layer */
            width: 6.3%;   
            height: 80.7%; 
            left: -6.8%;   
            bottom: 0; 

            background: url('catarm.png') no-repeat bottom center;
            background-size: contain;
            transform-origin: 25% 100%; 
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 10;
            pointer-events: none; 
        }

        .nav-arc {
            position: absolute;
            top: 15%;
            right: 8%;
            display: flex;
            flex-direction: column;
            gap: 4%;
            align-items: flex-end;
            z-index: 20;
        }

        .menu-btn {
            color: #d1d9e2; 
            /* Font scales with the container width */
            font-size: 4.5vw;  
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            padding: 5px 15px; 
        }

        /* Responsive font sizing for very tall screens */
        @media (min-aspect-ratio: 16/9) {
            .menu-btn { font-size: 8vh; }
        }

        .menu-btn:hover {
            color: #ffffff;
            transform: scale(1.05) translateX(-10px);
        }

        /* Horizontal offsets for the arc */
        #link1 { margin-right: 4%; }
        #link2 { margin-right: 2%; }
        #link3 { margin-right: 1%; }
        #link4 { margin-right: 0%; }

    </style>
</head>
<body>

    <div id="viewport">
        <div id="content-layer">
            
            <div id="shoulder-pivot">
                <div id="cat-arm"></div>
            </div>

            <nav class="nav-arc">
                <a href="page2.html" class="menu-btn" id="link1">projects</a>
                <a href="page3.html" class="menu-btn" id="link2">art</a>
                <a href="page4.html" class="menu-btn" id="link3">files</a>
                <a href="page5.html" class="menu-btn" id="link4">etc</a>
            </nav>

        </div>
    </div>

    <script>
        const pivot = document.getElementById('shoulder-pivot');
        const arm = document.getElementById('cat-arm');
        const buttons = document.querySelectorAll('.menu-btn');
        
        const restAngle = 16.0;  
        arm.style.transform = `rotate(${restAngle}deg)`;

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // Calculation is now based on screen position, 
                // which works regardless of how the container scales.
                const pivotRect = pivot.getBoundingClientRect();
                const shoulderX = pivotRect.left;
                const shoulderY = pivotRect.top;

                const btnRect = btn.getBoundingClientRect();
                const targetX = btnRect.left; 
                const targetY = btnRect.top + (btnRect.height / 2);

                const dx = targetX - shoulderX;
                const dy = targetY - shoulderY;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                const angleOffset = 72.5; 
                arm.style.transform = `rotate(${angle + angleOffset}deg)`;
            });

            btn.addEventListener('mouseleave', () => {
                arm.style.transform = `rotate(${restAngle}deg)`;
            });
        });
    </script>
</body>
</html>
