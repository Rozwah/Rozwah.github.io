<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>

    /* ══════════════════════════════════════
       TOKENS
    ══════════════════════════════════════ */
    :root {
      --green:        #8aff8e;
      --purple:       #6e2fff;
      --purple-light: #9a6fff;
      --cyan:         #61fffa;

      /* Per-portrait glow colours (can override) */
      --glow-1: rgba(138, 255, 142, 0.38);
      --glow-2: rgba( 97, 255, 250, 0.38);
      --glow-3: rgba(154, 111, 255, 0.38);

      /* How far the painting is inset from the frame edge.
         0% = fills container edge-to-edge (use when frame PNG has a transparent centre).
         Increase if your frame PNGs are opaque with a solid border. */
      --inset: 0%;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      font-family: Georgia, 'Times New Roman', serif;
      /* Gallery-room atmosphere: faint radial spotlight in the centre */
      background-image:
        radial-gradient(ellipse 70% 60% at 50% 55%,
          rgba(30, 10, 60, 0.55) 0%,
          #000 70%);
    }

    /* Vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse 90% 90% at 50% 50%,
        transparent 45%,
        rgba(0, 0, 0, 0.75) 100%
      );
      pointer-events: none;
      z-index: 0;
    }


    /* ══════════════════════════════════════
       ██ GUIDE CHARACTER
    ══════════════════════════════════════ */

    #guide {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
    }

    /* Three nested layers: float / shake / breathe */
    #g-float { animation: gFloat 3.9s ease-in-out infinite; }

    #g-tilt {
      width: 92px;
      height: 92px;
      animation: gTilt 6.3s ease-in-out infinite;
      pointer-events: all;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    #g-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      animation: gBreathe 2.5s ease-in-out infinite;
      filter:
        drop-shadow(0 0 16px rgba(97,255,250,.55))
        drop-shadow(0 0  7px rgba(110,47,255,.45));
    }

    /* Speaking */
    #guide.speaking #g-float  { animation: gSpeakBob   0.21s ease-in-out infinite; }
    #guide.speaking #g-tilt   { animation: gSpeakShake 0.17s ease-in-out infinite; }
    #guide.speaking #g-img    {
      animation: gSpeakPulse 0.28s ease-in-out infinite;
      filter:
        drop-shadow(0 0 22px rgba(97,255,250,.75))
        drop-shadow(0 0 12px rgba(110,47,255,.60));
    }

    /* Running */
    #guide.running #g-float { animation: gRunBounce 0.15s ease-in-out infinite; }
    #guide.running #g-tilt  { animation: gRunTilt   0.12s ease-in-out infinite; }
    #guide.running #g-img   { animation: none; }

    /* — Keyframes — */
    @keyframes gFloat   { 0%,100%{transform:translateY(0)}  30%{transform:translateY(-12px)} 65%{transform:translateY(-5px)} }
    @keyframes gTilt    { 0%,100%{transform:rotate(-2.5deg)} 50%{transform:rotate(2.5deg)} }
    @keyframes gBreathe { 0%,100%{transform:scale(1)}        50%{transform:scale(1.05)} }

    @keyframes gSpeakBob   { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-5px)} }
    @keyframes gSpeakShake {
      0%  {transform:rotate(-4.5deg) translateX(-1px)}
      25% {transform:rotate( 4.5deg) translateX( 1px) translateY(-2px)}
      50% {transform:rotate(-3deg)   translateX( 2px)}
      75% {transform:rotate( 3deg)   translateX(-1px) translateY(-1px)}
      100%{transform:rotate(-4.5deg) translateX(-1px)}
    }
    @keyframes gSpeakPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
    @keyframes gRunBounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes gRunTilt    { 0%,100%{transform:rotate(-9deg)} 50%{transform:rotate(9deg)} }


    /* ══════════════════════════════════════
       ██ SPEECH BUBBLE
    ══════════════════════════════════════ */
    #g-bubble {
      position: absolute;
      top: 0;
      left: 100px;
      min-width: 148px;
      max-width: 235px;
      background: #fff;
      color: #1a0a3a;
      border: 2px solid var(--purple-light);
      border-radius: 16px 16px 16px 4px;
      padding: 11px 15px;
      font-size: 12.5px;
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.55;
      box-shadow:
        0 0 24px rgba(110,47,255,.45),
        0 0  8px rgba(97,255,250,.30),
        0  6px 20px rgba(0,0,0,.55);
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;

      opacity: 0;
      transform: scale(0.78) translateX(-8px);
      transform-origin: left top;
      transition:
        opacity  0.18s ease,
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #g-bubble.visible { opacity:1; transform:scale(1) translateX(0); }

    /* Tail: points left (toward char on left) */
    #g-bubble::before {
      content:''; position:absolute;
      left:-12px; top:15px;
      border:6px solid transparent;
      border-right-color: var(--purple-light);
    }
    #g-bubble::after {
      content:''; position:absolute;
      left:-9px; top:16px;
      border:5px solid transparent;
      border-right-color: #fff;
    }

    /* Flip: bubble to LEFT of char */
    #g-bubble.flip {
      left:auto; right:100px;
      border-radius: 16px 16px 4px 16px;
      transform-origin: right top;
      transform: scale(0.78) translateX(8px);
    }
    #g-bubble.flip.visible { transform:scale(1) translateX(0); }
    #g-bubble.flip::before { left:auto; right:-12px; border-right-color:transparent; border-left-color:var(--purple-light); }
    #g-bubble.flip::after  { left:auto; right:-9px;  border-right-color:transparent; border-left-color:#fff; }

    /* Blinking cursor */
    #g-cursor {
      display:inline-block; width:6px; height:13px;
      background:var(--purple); vertical-align:text-bottom;
      margin-left:2px; border-radius:1px;
      animation: blink 0.65s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }


    /* ══════════════════════════════════════
       ██ GALLERY
    ══════════════════════════════════════ */
    .gallery {
      display: flex;
      align-items: flex-end;        /* line up at bottom so captions align */
      justify-content: center;
      gap: clamp(2.5rem, 5vw, 5rem);
      padding: 4rem 2rem 5rem;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }


    /* ══════════════════════════════════════
       ██ PORTRAIT
    ══════════════════════════════════════ */
    .portrait {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      cursor: pointer;

      /* Tilt set individually below */
      --tilt: 0deg;
      transform: rotate(var(--tilt));
      transform-origin: center bottom;

      transition:
        transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
        filter    0.35s ease;

      /* Fade-up entrance */
      animation: portraitIn 0.8s ease-out both;
    }

    .portrait:nth-child(1) { --tilt: -3.5deg; animation-delay: 0.15s; }
    .portrait:nth-child(2) { --tilt:  2deg;   animation-delay: 0.30s; }
    .portrait:nth-child(3) { --tilt: -1.5deg; animation-delay: 0.45s; }

    .portrait:hover {
      transform: rotate(0deg) scale(1.07);
    }

    @keyframes portraitIn {
      from { opacity:0; transform: translateY(32px) rotate(var(--tilt)); }
      to   { opacity:1; transform: translateY(0)    rotate(var(--tilt)); }
    }


    /* Frame container — painting underneath, frame PNG on top */
    .portrait-frame {
      position: relative;
      /* Default size — you can override per-portrait with an inline style */
      width:  var(--frame-w, 240px);
      height: var(--frame-h, 310px);

      /* glow set per portrait below */
      filter: var(--shadow);
      transition: filter 0.35s ease;
    }

    .portrait:nth-child(1) .portrait-frame {
      --shadow: drop-shadow(0 0 22px var(--glow-1)) drop-shadow(0 10px 28px rgba(0,0,0,.7));
    }
    .portrait:nth-child(2) .portrait-frame {
      --shadow: drop-shadow(0 0 22px var(--glow-2)) drop-shadow(0 10px 28px rgba(0,0,0,.7));
    }
    .portrait:nth-child(3) .portrait-frame {
      --shadow: drop-shadow(0 0 22px var(--glow-3)) drop-shadow(0 10px 28px rgba(0,0,0,.7));
    }

    .portrait:nth-child(1):hover .portrait-frame {
      --shadow: drop-shadow(0 0 44px var(--glow-1)) drop-shadow(0 14px 40px rgba(0,0,0,.85));
    }
    .portrait:nth-child(2):hover .portrait-frame {
      --shadow: drop-shadow(0 0 44px var(--glow-2)) drop-shadow(0 14px 40px rgba(0,0,0,.85));
    }
    .portrait:nth-child(3):hover .portrait-frame {
      --shadow: drop-shadow(0 0 44px var(--glow-3)) drop-shadow(0 14px 40px rgba(0,0,0,.85));
    }

    /*
      PAINTING — fills the inner area.
      If your frame PNG has a TRANSPARENT CENTRE, leave --inset at 0% (default).
      If your frame PNG is fully opaque with a painted border, increase --inset
      (e.g. 12%) so the painting sits inside the visible opening.
    */
    .paint-img {
      position: absolute;
      top:    var(--inset);
      left:   var(--inset);
      width:  calc(100% - var(--inset) * 2);
      height: calc(100% - var(--inset) * 2);
      object-fit: cover;
      display: block;
      z-index: 1;
    }

    /*
      FRAME OVERLAY — sits on top of painting.
      Should have a transparent centre so the painting shows through.
    */
    .frame-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;   /* stretch to match the container exactly */
      display: block;
      z-index: 2;
      pointer-events: none;
    }


    /* ══════════════════════════════════════
       ██ CAPTION
    ══════════════════════════════════════ */
    .caption {
      font-style: italic;
      font-size: 0.88rem;
      letter-spacing: 0.8px;
      opacity: 0.65;
      transition: opacity 0.3s, letter-spacing 0.35s;
      text-align: center;
    }

    /* Each caption picks up a theme colour */
    .portrait:nth-child(1) .caption { color: var(--green); }
    .portrait:nth-child(2) .caption { color: var(--cyan);  }
    .portrait:nth-child(3) .caption { color: var(--purple-light); }

    .portrait:hover .caption {
      opacity: 1;
      letter-spacing: 1.8px;
    }

  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       ██ GUIDE CHARACTER
  ══════════════════════════════════════ -->
  <div id="guide">
    <div id="g-float">
      <div id="g-tilt">
        <img id="g-img" src="face.png" alt="Guide" draggable="false">
      </div>
    </div>
    <div id="g-bubble" role="status" aria-live="polite">
      <span id="g-text"></span><span id="g-cursor"></span>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       ██ GALLERY

       Each .portrait can receive:
         style="--frame-w: 240px; --frame-h: 310px;"   to resize the frame
         style="--inset: 12%;"                          to inset painting inside frame
         data-msg="..."                                 custom guide speech line
  ══════════════════════════════════════ -->
  <div class="gallery">

    <div class="portrait"
         data-msgs='[
           "Now this one... it has a certain weight to it. Look carefully.",
           "The composition here is no accident. Every element placed with intent.",
           "Something in the palette tells me this one took the longest."
         ]'>
      <div class="portrait-frame">
        <img class="paint-img" src="paint1.png" alt="Painting I">
        <img class="frame-img" src="frame1.png" alt="Frame I">
      </div>
      <div class="caption">Untitled I</div>
    </div>

    <div class="portrait"
         data-msgs='[
           "The centrepiece. Bold, unapologetic. Exactly where it belongs.",
           "Notice how your eye keeps returning to the centre of this one?",
           "This is the one I would steal, if I had hands."
         ]'>
      <div class="portrait-frame">
        <img class="paint-img" src="paint2.png" alt="Painting II">
        <img class="frame-img" src="frame2.png" alt="Frame II">
      </div>
      <div class="caption">Untitled II</div>
    </div>

    <div class="portrait"
         data-msgs='[
           "Quieter than the others. The more you look, the more it gives.",
           "The restraint in this piece is what makes it powerful.",
           "I always feel like this one is watching back."
         ]'>
      <div class="portrait-frame">
        <img class="paint-img" src="paint3.png" alt="Painting III">
        <img class="frame-img" src="frame3.png" alt="Frame III">
      </div>
      <div class="caption">Untitled III</div>
    </div>

  </div>


  <!-- ══════════════════════════════════════
       ██ CHARACTER LOGIC
  ══════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    const guide   = document.getElementById('guide');
    const gTilt   = document.getElementById('g-tilt');
    const gImg    = document.getElementById('g-img');
    const gBubble = document.getElementById('g-bubble');
    const gText   = document.getElementById('g-text');

    const CHAR_W    = 92;
    const EDGE_PAD  = 20;   // px gap from screen edge when docked

    /* ── State ── */
    let posX      = EDGE_PAD + Math.random() * 25;
    let posY      = EDGE_PAD + Math.random() * 18;
    let onLeft    = true;    // which side the character is docked on
    let isMoving  = false;   // true during the slide-across animation
    let isSpeaking= false;
    let lastMsg   = '';
    let typeIv    = null;
    let hideTO    = null;
    let driftTO   = null;

    /* ── Position helper ── */
    function setPos(x, y, durX = '0s', durY = '0s', ease = 'cubic-bezier(0.25,0.46,0.45,0.94)') {
      guide.style.transitionProperty       = 'left, top';
      guide.style.transitionDuration       = `${durX}, ${durY}`;
      guide.style.transitionTimingFunction = `${ease}, ${ease}`;
      guide.style.left = x + 'px';
      guide.style.top  = y + 'px';
      posX = x; posY = y;
    }

    setPos(posX, posY);

    /* ── TOGGLE SIDE on click ── */
    gTilt.addEventListener('click', e => {
      e.stopPropagation();
      if (isMoving) return;
      toggleSide();
    });

    function toggleSide() {
      isMoving = true;
      hideBubble(true);
      guide.classList.remove('speaking');
      guide.classList.add('running');

      const winW = window.innerWidth;
      const ty   = EDGE_PAD + Math.random() * 20;

      if (onLeft) {
        /* ── LEFT → RIGHT ── */
        gImg.style.transform = 'scaleX(-1)';           // face left (inward)
        const tx = winW - CHAR_W - EDGE_PAD - Math.random() * 18;
        setPos(tx, ty, '0.55s', '0.40s');
        onLeft = false;
      } else {
        /* ── RIGHT → LEFT ── */
        gImg.style.transform = '';                      // face right (default / inward)
        const tx = EDGE_PAD + Math.random() * 18;
        setPos(tx, ty, '0.55s', '0.40s');
        onLeft = true;
      }

      /* Settle after slide completes */
      setTimeout(() => {
        isMoving = false;
        guide.classList.remove('running');
        updateBubbleSide();   // re-orient bubble for new position
        scheduleDrift();      // restart drift on correct side
      }, 600);
    }

    /* ── Speech bubble side ── */
    function updateBubbleSide() {
      /* Bubble flips to the opposite side of the character so it points inward */
      gBubble.classList.toggle('flip', !onLeft);
    }

    /* ── Show / hide bubble ── */
    function showBubble(msg) {
      if (isMoving) return;
      if (msg === lastMsg && gBubble.classList.contains('visible')) return;
      lastMsg = msg;

      clearInterval(typeIv);
      clearTimeout(hideTO);
      updateBubbleSide();

      gText.textContent = '';
      gBubble.classList.add('visible');
      isSpeaking = true;
      guide.classList.add('speaking');

      let i = 0;
      const delay = Math.max(26, Math.min(55, 2000 / msg.length));
      typeIv = setInterval(() => {
        if (i < msg.length) { gText.textContent += msg[i++]; }
        else { clearInterval(typeIv); }
      }, delay);
    }

    function hideBubble(now = false) {
      clearInterval(typeIv);
      clearTimeout(hideTO);
      const doHide = () => {
        gBubble.classList.remove('visible');
        isSpeaking = false;
        guide.classList.remove('speaking');
        lastMsg = '';
      };
      if (now) doHide();
      else hideTO = setTimeout(doHide, 650);
    }

    /* ── Per-portrait message pools ── */
    function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function msgFor(el) {
      /* data-msgs: JSON array of strings — picks one at random each hover */
      if (el.dataset && el.dataset.msgs) {
        try {
          const arr = JSON.parse(el.dataset.msgs);
          if (Array.isArray(arr) && arr.length) return rnd(arr);
        } catch (e) { /* fall through */ }
      }
      /* Fallback single message */
      if (el.dataset && el.dataset.msg) return el.dataset.msg;
      return rnd(["Hover each painting and I'll tell you what I notice.",
                  "Something worth looking at, don't you think?",
                  "Art speaks to everyone differently."]);
    }

    /* ── Hover listeners on portraits ── */
    document.querySelectorAll('.portrait').forEach(el => {
      el.addEventListener('mouseenter', () => showBubble(msgFor(el)));
      el.addEventListener('mouseleave', () => hideBubble());
    });

    /* ── Ambient drift — stays on whichever side is current ── */
    function scheduleDrift() {
      clearTimeout(driftTO);
      driftTO = setTimeout(() => {
        if (!isMoving && !isSpeaking) {
          const winW = window.innerWidth;
          const nx = onLeft
            ? EDGE_PAD + Math.random() * 50
            : winW - CHAR_W - EDGE_PAD - Math.random() * 50;
          const ny = EDGE_PAD + Math.random() * 40;
          setPos(nx, ny, '2.8s', '2.2s', 'ease-in-out');
        }
        scheduleDrift();
      }, 6000 + Math.random() * 5000);
    }

    scheduleDrift();

    /* ── Opening greeting ── */
    const GREETINGS = [
      "Welcome to the gallery. Hover a painting — I'll tell you what I see.",
      "Ah, a visitor! Try hovering the portraits...",
      "These three have been waiting. Take your time with each one.",
      "The paintings are alive if you look long enough. Or so I hear.",
    ];

    setTimeout(() => {
      showBubble(rnd(GREETINGS));
      setTimeout(() => hideBubble(), 5500);
    }, 850);

  })();
  </script>

</body>
</html>
