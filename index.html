<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
    body{
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
        color:#111;
    }

    /* NAVBAR */
    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:25px 60px;
    }

    .logo{
        font-weight:700;
        font-size:22px;
    }

    .nav-links a{
        margin-left:30px;
        text-decoration:none;
        color:#111;
        font-size:16px;
    }

    /* MAIN SECTION */
    .main{
        display:flex;
        align-items:center;
        justify-content:center;
        padding:80px 60px;
        gap:80px;
    }

    .profile-pic{
        width:420px;
        height:420px;
        border-radius:50%;
        object-fit:cover;
    }

    .intro{
        max-width:550px;
    }

    .intro h1{
        font-size:90px;
        margin:0 0 20px 0;
        font-weight:800;
    }

    .intro h3{
        margin:0;
        font-size:20px;
        font-weight:700;
    }

    .intro p{
        margin-top:10px;
        line-height:1.6;
        color:#333;
    }

    /* BUTTON CIRCLES */
    .circles{
        margin-top:40px;
        display:flex;
        gap:25px;
    }

    .circle{
        width:140px;
        height:140px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:700;
        text-decoration:none;
        color:#111;
        font-size:18px;
    }

    .resume{ background:#f4b400; }
    .projects{ background:#ff3b30; }
    .contact{ background:#79d5e2; }

    /* FOOTER */
    .footer{
        border-top:1px solid #ccc;
        margin-top:80px;
        padding:30px 60px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        font-size:14px;
    }

    .footer-section{
        line-height:1.6;
    }

    .social a{
        margin-right:10px;
        text-decoration:none;
        color:#111;
        font-weight:bold;
    }

    @media(max-width:1000px){
        .main{
            flex-direction:column;
            text-align:center;
        }

        .intro h1{
            font-size:60px;
        }

        .circles{
            justify-content:center;
        }
    }
</style>
</head>
<body>

<!-- NAVIGATION -->
<div class="navbar">
    <div class="logo">Cat Gun</div>
    <div class="nav-links">
        <a href="#">Resume</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <img src="CatGun.png" alt="Profile Image" class="profile-pic">

    <div class="intro">
        <h1>Hello</h1>
        <h3>Hi</h3>
        <p>
            I'm a paragraph.
        </p>

        <div class="circles">
            <a href="#" class="circle resume">Resume</a>
            <a href="#" class="circle projects">Projects</a>
            <a href="#" class="circle contact">Contact</a>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-section">
        <strong>Phone</strong><br>
        123-456-7890
    </div>

    <div class="footer-section">
        <strong>Email</strong><br>
        info@mysite.com
    </div>

    <div class="footer-section social">
        <strong>Follow Me</strong><br>
        <a href="#">in</a>
        <a href="#">t</a>
    </div>

    <div class="footer-section">
        © 2026 <br>
        
    </div>
</div>

</body>
</html>
