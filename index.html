<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>This Is Safe I Promise</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        font-family: Impact, Arial Black, sans-serif;
        overflow: hidden;
        color: white;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 120px;
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 10px;
        animation: crazy 0.8s infinite alternate;
        text-shadow: 
            0 0 10px red,
            0 0 20px yellow,
            0 0 30px lime,
            0 0 40px cyan,
            0 0 50px magenta;
    }

    label {
        font-size: 24px;
        margin-right: 10px;
    }

    input {
        padding: 10px;
        font-size: 20px;
        border: 3px solid white;
        border-radius: 5px;
        background: black;
        color: white;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        margin-left: 10px;
        cursor: pointer;
        border: 2px solid white;
        background: black;
        color: white;
    }

    .corner-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
    }
</style>
</head>

<body>
    <div class="container">
        <h1>This is a safe website</h1>
        <div>
            <label for="nameInput">SSN:</label>
            <input type="text" id="nameInput" placeholder="Enter your Social Security Numbers">
            <button onclick="submitName()">Enter</button>
        </div>
    </div>

    <button class="corner-button" onclick="goToPage()">Next Page</button>

<script>
    function submitName() {
        const name = document.getElementById('nameInput').value;
        alert("hewo pwincess " + name.toUpperCase() + "!!!");
    }

    function goToPage() {
        window.location.href = "page2.html";
    }
</script>
</body>
</html>
